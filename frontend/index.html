<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CompuBasics — Learning Module" />
    <meta name="theme-color" content="#00ADB5" />
    <title>CompuBasics — Learning Module</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-white" style="margin:0">
    <div id="root"></div>

    <!-- Loading indicator shown while JS bundles load -->
    <div id="app-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f8fafc;font-family:Inter,system-ui,sans-serif;flex-direction:column;gap:1rem">
      <div style="font-size:3rem">📖</div>
      <div style="font-size:1.25rem;font-weight:700;color:#007f86">Loading Learning Module…</div>
      <div style="width:160px;height:6px;background:#e2e8f0;border-radius:999px;overflow:hidden">
        <div style="width:60%;height:100%;background:#00ADB5;border-radius:999px;animation:loadbar 1.2s ease-in-out infinite alternate"></div>
      </div>
      <style>@keyframes loadbar{from{width:20%;margin-left:0}to{width:60%;margin-left:40%}}</style>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
